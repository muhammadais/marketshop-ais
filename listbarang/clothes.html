<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Market Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            text-align: center;
        }
        h1 {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
        }
        .container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 20px;
        }
        .product {
            background: white;
            width: 200px;
            margin: 15px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .product img {
            width: 100%;
            border-radius: 10px;
        }
        .price {
            color: green;
            font-weight: bold;
        }
        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #219150;
        }
    </style>
</head>
<body>

    <h1>🛒 Market Shop</h1>

    <div class="container">

        <div class="product">
            <img src="foto/SEPATU ADIDAS SPEZIAL.WEBP" alt="">
            <h3>SEPATU ADIDAS SPEZIAL</h3>
            <p class="price">Rp 250.000</p>
            <button>Beli</button>
        </div>

        <div class="product">
            <img src="foto/Tas ransel adidas.JFIF" alt="">
            <h3>Tas Ransel adidas</h3>
            <p class="price">Rp 150.000</p>
            <button>Beli</button>
        </div>

        <div class="product">
            <img src="foto/jam tangan.WEBP" alt="">
            <h3>Jam tangan</h3>
            <p class="price">Rp 300.000</p>
            <button>Beli</button>
        </div>

        <div class="product">
            <img src="foto/Headphone onikuma.WEBP" alt="">
            <h3>Headphone onikuma</h3>
            <p class="price">Rp 200.000</p>
            <button>Beli</button>
        </div>

        <div class="product">
            <img src="foto/Kacamata.jfif" alt="">
            <h3>Kacamata</h3>
            <p class="price">Rp 100.000</p>
            <button>Beli</button>
        </div>

    </div>

</body>
</html>
