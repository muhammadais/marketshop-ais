<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MarketShop Sederhana</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px;
            text-align: center;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 8px;
        }

        .price {
            color: #e74c3c;
            font-weight: bold;
            margin: 10px 0;
        }

        button {
            background-color: #27ae60;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #219150;
        }
    </style>
</head>
<body>

<header>
    <h1>🛒 MarketShop Online</h1>
</header>

<div class="container">

    <div class="card">
        <img src="TEH PUCUK.jfif" alt="TEH PUCUK">
        <h3>TEH PUCUK</h3>
        <p class="price">Rp 250.000</p>
        <button>Beli</button>
    </div>

    <div class="card">
        <img src="SLOBOR.jfif" alt="SLOBOR">
        <h3>SLOBOR/h3>
        <p class="price">Rp 180.000</p>
        <button>Beli</button>
    </div>

    <div class="card">
        <img src="PIZZA.jfif" alt="PIZZA">
        <h3>PIZZA</h3>
        <p class="price">Rp 320.000</p>
        <button>Beli</button>
    </div>

    <div class="card">
        <img src="AIR SURGA.jfif" alt="AIR SURGA">
        <h3>AIR SURGA</h3>
        <p class="price">Rp 150.000</p>
        <button>Beli</button>
    </div>

    <div class="card">
        <img src="NASI KEBULI ARAB SAUDI.jfif" alt="NASI KEBULI ARAB SAUDI">
        <h3>NASI KEBULI ARAB SAUDI</h3>
        <p class="price">Rp 120.000</p>
        <button>Beli</button>
    </div>

</div>

</body>
</html>
